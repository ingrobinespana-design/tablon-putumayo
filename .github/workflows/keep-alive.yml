name: Mantener backend despierto

# Render (plan Free) apaga la instancia tras 15 min sin trafico.
# Este ping cada 10 minutos evita que se duerma.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping al backend en Render
        run: |
          codigo=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://tablon-putumayo-backend.onrender.com/ || echo "000")
          echo "Respuesta del backend: HTTP $codigo"
          if [ "$codigo" != "200" ]; then
            echo "::warning::El backend no respondio 200 (respondio $codigo). Si se repite, revisar el dashboard de Render."
          fi
